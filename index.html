<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Tier List</title>

<style>
body {
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #0f1117, #07080c);
  color:#dfe6ff;
}

/* NAV */
nav {
  padding:14px 30px;
  background:#0c0f16;
  border-bottom:1px solid #1a1f2b;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-weight:900;
  font-size:22px;
  letter-spacing:2px;
  background:linear-gradient(90deg,#f5c030,#ffd86b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TABS */
.gm-tabs {
  display:flex;
  gap:10px;
  padding:15px;
}

.gm-tab {
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 18px;
  background:#11141c;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.gm-tab:hover {
  background:#1a1f2a;
}

.gm-tab img {
  width:18px;
}

.gm-tab.active {
  background:linear-gradient(120deg,#f5c030,#b88700);
  color:#000;
  font-weight:700;
}

/* TABLE */
.tbl {
  width:95%;
  margin:auto;
}

.tbl-row {
  display:grid;
  grid-template-columns: 60px 1fr 120px 120px 1fr;
  align-items:center;
  padding:12px;
  margin:8px 0;
  background:#0f131c;
  border-radius:14px;
  transition:.25s;
}

.tbl-row:hover {
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(245,192,48,.15);
}

/* RANK */
.rank {
  font-weight:900;
  font-size:18px;
}

/* PLAYER */
.player {
  display:flex;
  align-items:center;
  gap:12px;
}

.skin {
  width:48px;
  height:48px;
  border-radius:8px;
}

.name {
  font-weight:700;
}

.points {
  color:#f5c030;
  font-weight:700;
}

/* REGION */
.region {
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.EU { background:#123d22; color:#3cff7a; }
.NA { background:#12243d; color:#4da6ff; }

/* TIERS */
.tiers {
  display:flex;
  gap:6px;
}

.badge {
  padding:6px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
}

.HT1 { background:linear-gradient(#ffd86b,#c69200); color:#000; }
.HT2 { background:#cfd6ff; color:#000; }
.HT3 { background:#c07a3a; }
.LT4 { background:#2c2f3a; }

/* ANIM */
.fade {
  animation:fade .3s ease forwards;
  opacity:0;
}
@keyframes fade {
  to { opacity:1; transform:translateY(0); }
  from { opacity:0; transform:translateY(10px); }
}
</style>
</head>

<body>

<nav>
  <div class="logo">MCTIERS</div>
</nav>

<div class="gm-tabs" id="tabs"></div>

<div class="tbl" id="table"></div>

<script>

const ICONS = {
  Overall: "https://cdn-icons-png.flaticon.com/512/1828/1828884.png",
  Crystal: "https://cdn-icons-png.flaticon.com/512/616/616494.png",
  Sword: "https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
  NethOP: "https://cdn-icons-png.flaticon.com/512/833/833472.png",
  UHC: "https://cdn-icons-png.flaticon.com/512/833/833314.png",
  SMP: "https://cdn-icons-png.flaticon.com/512/616/616408.png"
};

const DATA = {
  gamemodes:["Overall","Crystal","Sword","NethOP","UHC","SMP"],
  players:[
    {
      username:"_lxd",
      region:"EU",
      points:1520,
      tiers:{Crystal:"HT1",Sword:"HT2",NethOP:"HT1"}
    },
    {
      username:"VoidTwinkles",
      region:"NA",
      points:1380,
      tiers:{Crystal:"HT2",Sword:"HT2",UHC:"HT3"}
    }
  ]
};

let active = "Overall";

function renderTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = "";

  DATA.gamemodes.forEach(gm=>{
    const tab = document.createElement("div");
    tab.className = "gm-tab" + (gm===active ? " active":"");

    tab.innerHTML = `
      <img src="${ICONS[gm]}">
      ${gm}
    `;

    tab.onclick = ()=>{
      active = gm;
      renderTabs();
      renderTable();
    };

    el.appendChild(tab);
  });
}

function skin(u){
  return `https://mc-heads.net/avatar/${u}`;
}

function renderTable(){
  const el = document.getElementById("table");
  el.innerHTML = "";

  DATA.players
    .sort((a,b)=>b.points-a.points)
    .forEach((p,i)=>{

      const row = document.createElement("div");
      row.className="tbl-row fade";

      row.innerHTML = `
        <div class="rank">#${i+1}</div>

        <div class="player">
          <img class="skin" src="${skin(p.username)}">
          <div>
            <div class="name">${p.username}</div>
            <div class="points">${p.points} pts</div>
          </div>
        </div>

        <div class="region ${p.region}">${p.region}</div>

        <div>${p.points}</div>

        <div class="tiers">
          ${
            Object.entries(p.tiers)
            .map(([gm,t])=>`<div class="badge ${t}">${gm} ${t}</div>`)
            .join("")
          }
        </div>
      `;

      el.appendChild(row);
    });
}

renderTabs();
renderTable();

</script>

</body>
</html>
