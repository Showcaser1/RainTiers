<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MC Tier List</title>

<style>
body {
  margin:0;
  font-family:Inter, sans-serif;
  background:#0b0f16;
  color:#d7e0ff;
}

/* NAV */
nav {
  padding:14px 30px;
  background:#0d121b;
  border-bottom:1px solid #1a2130;
}

.logo span { font-weight:900; }

/* TABS */
.gm-tabs {
  display:flex;
  gap:10px;
  padding:15px 30px;
}

.gm-tab {
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 18px;
  background:#11141c;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.gm-tab:hover {
  background:#1a1f2a;
}

.gm-tab.on {
  background:#1a2130;
  box-shadow:0 0 10px rgba(245,192,48,.25);
  color:#f5c030;
}

.tab-icon svg {
  width:18px;
  height:18px;
}

/* TABLE */
.tbl {
  width:95%;
  margin:auto;
}

.tbl-head, .tbl-row {
  display:grid;
  grid-template-columns: 50px 1fr 90px auto;
  align-items:center;
  padding:10px;
}

.tbl-head {
  color:#4a5166;
  font-size:12px;
}

.tbl-row {
  border-bottom:1px solid #141a26;
  transition:.2s;
}

.tbl-row:hover {
  background:#11151f;
}

/* PLAYER */
.player-cell {
  display:flex;
  align-items:center;
  gap:10px;
}

.skin-cell {
  width:48px;
  height:48px;
  border-radius:6px;
  overflow:hidden;
  background:#222;
}

.skin-cell img {
  width:100%;
  image-rendering:pixelated;
}

/* REGION */
.region {
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.r-EU { background:#0d2e1a; color:#3ec860; }
.r-NA { background:#0d1e38; color:#4090e0; }

/* TIERS */
.tiers-cell {
  display:flex;
  gap:6px;
}

.tbadge-icon {
  width:36px;
  height:36px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:800;
}

/* COLORS */
.tb-HT1 { background:linear-gradient(#ffd86b,#c69200); color:#000; }
.tb-HT2 { background:#cfd6ff; color:#000; }
.tb-HT3 { background:#c07a3a; }
.tb-LT4 { background:#2c2f3a; color:#8898c0; }

</style>
</head>

<body>

<nav>
  <div class="logo">
    <span>MCTIERS</span>
  </div>
</nav>

<div class="gm-tabs" id="gmTabs"></div>

<div class="tbl">
  <div class="tbl-head">
    <span>#</span>
    <span>Player</span>
    <span>Region</span>
    <span>Tiers</span>
  </div>
  <div id="tblBody"></div>
</div>

<script>

/* FIXED SVG (NOW STRINGS) */
const ICONS = {
  Overall: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M5 3H3v5c0 2.7 2.3 5 5 5h1v3h6v-3h1c2.7 0 5-2.3 5-5V3h-2v5c0 1.6-1.4 3-3 3h-1V3H5z"/></svg>`,
  Crystal: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 7 8 2 10l4 6-1 6 7-3 7 3-1-6 4-6-5-2z"/></svg>`,
  Sword: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M2 21 10 13 11 14 3 22z"/></svg>`
};

const FALLBACK = {
  title:"MC Tier List",
  gamemodes:["Overall","Crystal","Sword","NethOP","UHC","SMP","Pot","Axe"],
  players:[]
};

let data = FALLBACK;
let activeGm = "Overall";

function skinUrl(u){
  return `https://mc-heads.net/avatar/${u}/48`;
}

function makeBadge(t){
  return `<div class="tbadge-icon tb-${t}">${t}</div>`;
}

function renderTabs(){
  const c = document.getElementById("gmTabs");
  c.innerHTML = "";

  data.gamemodes.forEach(gm=>{
    const b = document.createElement("div");
    b.className = "gm-tab" + (gm===activeGm ? " on":"");
    b.innerHTML = `<span class="tab-icon">${ICONS[gm]||ICONS.Overall}</span>${gm}`;
    b.onclick = ()=>{activeGm=gm;renderTabs();renderTable();};
    c.appendChild(b);
  });
}

function renderTable(){
  const body = document.getElementById("tblBody");
  body.innerHTML = "";

  const players = data.players.filter(p =>
    activeGm==="Overall" ? true : p.tiers?.[activeGm]
  );

  if(!players.length){
    body.innerHTML = `<div style="padding:40px;color:#444">No players</div>`;
    return;
  }

  players.forEach((p,i)=>{
    let badges="";
    Object.values(p.tiers||{}).forEach(t=>{
      badges+=makeBadge(t);
    });

    const row = document.createElement("div");
    row.className="tbl-row";
    row.innerHTML = `
      <div>${i+1}</div>
      <div class="player-cell">
        <div class="skin-cell">
          <img src="${skinUrl(p.username)}">
        </div>
        <div>
          <div>${p.username}</div>
          <div style="font-size:12px;color:#6b748f">${p.rank_label}</div>
        </div>
      </div>
      <div><span class="region r-${p.region}">${p.region}</span></div>
      <div class="tiers-cell">${badges}</div>
    `;
    body.appendChild(row);
  });
}

renderTabs();
renderTable();

</script>

</body>
</html>
