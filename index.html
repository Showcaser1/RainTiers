<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCTiers Style</title>

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#0b0f16;
  color:#d7e0ff;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:14px 30px;
  background:#0d121b;
  border-bottom:1px solid #1a2130;
}

.logo{
  font-weight:900;
  font-size:20px;
  background:linear-gradient(90deg,#f5c030,#ffdf70);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TABS */
.tabs{
  display:flex;
  gap:12px;
  padding:18px 30px;
}

.tab{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:10px;
  background:#101521;
  cursor:pointer;
  transition:.2s;
}

.tab img{
  width:18px;
  image-rendering:pixelated;
}

.tab.active{
  background:#1a2130;
  box-shadow:inset 0 -2px 0 #f5c030;
}

/* TABLE */
.table{
  width:95%;
  margin:auto;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns: 60px 1fr 80px 1fr;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #151c28;
  transition:.2s;
}

.row:hover{
  background:#101521;
}

/* RANK */
.rank{
  font-weight:800;
  font-size:18px;
}

.r1{color:#f5c030;}
.r2{color:#cfd6ff;}
.r3{color:#d68a3a;}

/* PLAYER */
.player{
  display:flex;
  align-items:center;
  gap:12px;
}

.skin{
  width:36px;
  height:36px;
  border-radius:6px;
}

.name{
  font-weight:700;
}

.sub{
  font-size:12px;
  color:#6b748f;
}

/* REGION */
.region{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  text-align:center;
}

.NA{background:#2a1a1a;color:#ff6b6b;}
.EU{background:#1a2a1a;color:#4dff88;}

/* TIERS */
.tiers{
  display:flex;
  gap:6px;
}

.tier{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:800;
  color:#000;
}

/* COLORS */
.ht1{background:linear-gradient(#ffd86b,#c69200);}
.ht2{background:#cfd6ff;}
.ht3{background:#c07a3a;}
.lt1{background:#888;}
.lt2{background:#555;}
.lt3{background:#333;}
</style>
</head>

<body>

<nav>
  <div class="logo">MCTIERS</div>
</nav>

<div class="tabs" id="tabs"></div>
<div class="table" id="table"></div>

<script>

const ICONS={
  Overall:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3a/Nether_Star_JE2_BE2.png",
  Crystal:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/e/e3/End_Crystal_JE2_BE2.png",
  Sword:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/38/Diamond_Sword_JE3_BE3.png",
  UHC:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/1/1e/Golden_Apple_JE2_BE2.png"
};

const DATA={
  gamemodes:["Overall","Crystal","Sword","UHC"],
  players:[
    {
      name:"Marlowww",
      region:"NA",
      points:355,
      tiers:["ht1","ht1","lt1","ht2"]
    },
    {
      name:"ItzRealMe",
      region:"NA",
      points:320,
      tiers:["ht3","ht3","ht1","ht1"]
    },
    {
      name:"Swight",
      region:"NA",
      points:260,
      tiers:["ht1","ht2","lt2","lt2"]
    }
  ]
};

let active="Overall";

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML="";
  DATA.gamemodes.forEach(g=>{
    const t=document.createElement("div");
    t.className="tab"+(g===active?" active":"");
    t.innerHTML=`<img src="${ICONS[g]}">${g}`;
    t.onclick=()=>{active=g;renderTabs();};
    el.appendChild(t);
  });
}

function skin(u){
  return `https://mc-heads.net/avatar/${u}/36`;
}

function renderTable(){
  const el=document.getElementById("table");
  el.innerHTML="";

  DATA.players
  .sort((a,b)=>b.points-a.points)
  .forEach((p,i)=>{

    const row=document.createElement("div");
    row.className="row";

    row.innerHTML=`
      <div class="rank ${i==0?'r1':i==1?'r2':i==2?'r3':''}">
        ${i+1}.
      </div>

      <div class="player">
        <img class="skin" src="${skin(p.name)}">
        <div>
          <div class="name">${p.name}</div>
          <div class="sub">Combat Master (${p.points} pts)</div>
        </div>
      </div>

      <div class="region ${p.region}">
        ${p.region}
      </div>

      <div class="tiers">
        ${p.tiers.map(t=>`<div class="tier ${t}">${t.toUpperCase()}</div>`).join("")}
      </div>
    `;

    el.appendChild(row);
  });
}

renderTabs();
renderTable();

</script>

</body>
</html>
